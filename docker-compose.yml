services:
  pocketbase:
    image: ghcr.io/muchobien/pocketbase:latest
    container_name: kongsi-pocketbase
    restart: unless-stopped
    ports:
      - "8098:8090"
    volumes:
      - ./pb_data:/pb_data
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:8090/api/health || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
